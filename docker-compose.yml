version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blackbelt-app
    restart: unless-stopped
    env_file: .env.production
    environment:
      - NODE_ENV=production
    expose:
      - "5000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs
    networks:
      - blackbelt-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mysql:
    image: mysql:8.0
    container_name: blackbelt-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: blackbelt
      MYSQL_USER: blackbelt
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-blackbelt_secret}
    # MySQL só acessível via rede interna Docker (não exposto ao público)
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d
    networks:
      - blackbelt-net
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max-connections=100
      --innodb-buffer-pool-size=536870912
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: blackbelt-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - blackbelt-net

  backup:
    image: mysql:8.0
    container_name: blackbelt-backup
    restart: unless-stopped
    entrypoint: /bin/bash
    command:
      - -c
      - |
        apt-get update -qq && apt-get install -y -qq cron > /dev/null 2>&1
        chmod +x /scripts/backup.sh
        echo "0 3 * * * /scripts/backup.sh >> /var/log/backup.log 2>&1" | crontab -
        echo "[$(date)] Backup cron scheduled: daily at 03:00"
        echo "[$(date)] Running initial backup..."
        /scripts/backup.sh
        cron -f
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: blackbelt
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-blackbelt_secret}
      MYSQL_DATABASE: blackbelt
      BACKUP_DIR: /backups
      RETENTION_DAYS: "30"
    volumes:
      - ./docker/scripts/backup.sh:/scripts/backup.sh:ro
      - backup_data:/backups
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - blackbelt-net

volumes:
  mysql_data:
    driver: local
  app_logs:
    driver: local
  backup_data:
    driver: local

networks:
  blackbelt-net:
    driver: bridge
